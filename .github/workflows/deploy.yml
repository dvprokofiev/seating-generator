name: Build website, presentation and paper

on:
  repository_dispatch:
    types: [rebuild-archive]
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "presentation/**"
      - "speech/**"
      - "paper/**"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-presentation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Presentation Dist
        id: cache-slides
        uses: actions/cache@v4
        with:
          path: presentation/dist
          key: ${{ runner.os }}-slides-${{ hashFiles('presentation/**') }}

      - name: Install pnpm
        if: steps.cache-slides.outputs.cache-hit != 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        if: steps.cache-slides.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: "pnpm"
          cache-dependency-path: presentation/pnpm-lock.yaml

      - name: Install and Build Slides
        if: steps.cache-slides.outputs.cache-hit != 'true'
        run: |
          npm i -g @antfu/ni
          
          cd presentation
          
          pnpm install --frozen-lockfile

          npx playwright install --with-deps chromium

          pnpm run build --base /
          
          npx slidev export --format pdf --dark --per-slide --output dist/presentation.pdf
          npx slidev export --format pptx --output dist/presentation.pptx

          python -m pip install python-pptx
          python patch_pptx.py

      - name: Upload Presentation Artifact
        uses: actions/upload-artifact@v4
        with:
          name: presentation-dist
          path: presentation/dist/

  build-paper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Paper PDF
        id: cache-paper
        uses: actions/cache@v4
        with:
          path: paper/paper.pdf
          key: ${{ runner.os }}-paper-${{ hashFiles('paper/**/*.tex', 'paper/**/*.bib', 'presentation/public/screenshots/*') }}
          restore-keys: |
            ${{ runner.os }}-paper-

      - name: Install Pygments (for minted)
        if: steps.cache-paper.outputs.cache-hit != 'true'
        run: |
          python3 -m pip install Pygments

      - name: Compile LaTeX document
        if: steps.cache-paper.outputs.cache-hit != 'true'
        uses: xu-cheng/latex-action@v3
        with:
          root_file: paper.tex
          working_directory: paper/
          args: "-shell-escape -pdf -interaction=nonstopmode -halt-on-error"

      - name: Upload Paper Artifact
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdf
          path: paper/paper.pdf

  prepare-archive:
    needs: [build-presentation, build-paper]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout External Repos
        run: |
          git clone --depth 1 https://github.com/dvprokofiev/seating-generator-frontend frontend
          git clone --depth 1 https://github.com/dvprokofiev/seating-generator-backend backend

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: temp_artifacts
          merge-multiple: true

      - name: Create Final Archive
        run: |
          mkdir -p final_archive
          cp -r frontend final_archive/
          cp -r backend final_archive/

          mkdir -p final_archive/presentation
          cp temp_artifacts/presentation.pdf final_archive/presentation/
          cp temp_artifacts/presentation.pptx final_archive/presentation/

          cp temp_artifacts/paper.pdf final_archive/paper.pdf

          rm -rf final_archive/**/.git
          zip -r seating-generator.zip final_archive

      - name: Upload Final Archive
        uses: actions/upload-artifact@v4
        with:
          name: final-archive
          path: seating-generator.zip

  deploy:
    needs: [build-presentation, build-paper, prepare-archive]
    runs-on: ubuntu-latest
    steps:
      - name: Download all
        uses: actions/download-artifact@v4
        with:
          path: final_dist
          merge-multiple: true

      - name: Upload for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: final_dist

      - name: Deploy
        uses: actions/deploy-pages@v4
